<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardar preços de produtos pro Jeffão</title>

    <style>
body{
    font-family: Arial;
    background-color: #e9e9e9;
    padding: 20px;
}

h2{
    margin-bottom: 10px;
}

input{
    padding: 4px;
    margin-right: 5px;
}

button{
    padding: 4px 8px;
    margin-right: 5px;
    cursor: pointer;
}

table{
    border-collapse: collapse;
    margin-top: 10px;
    background-color: white;
}

th, td{
    border: 1px solid black;
    padding: 6px 10px;
    text-align: center;
}

th{
    background-color: #dcdcdc;
}

hr{
    margin: 15px 0;
}

#mensagem{
    margin-top: 10px;
}
</style>

</head>
<body>
    <h2>Cadastro de Produtos (Array de Objetos)</h2>

<label>Produto:</label>
<input type="text" id="nome" placeholder="Ex: Mouse">

<label>Preço (R$):</label>
<input type="number" id="preco" placeholder="Ex: 99.90" step="0.01">

<label>Quantidade:</label>
<input type="number" id="quantidade" placeholder="Ex: 2">

<button onclick="adicionar()">Adicionar produto</button>
<button onclick="listar()">Listar produtos</button>
<button onclick="resumo()">Resumo</button>
<button onclick="limpar()">Limpar tudo</button>

<hr>

<h4>Remover por índice</h4>

<input type="number" id="indice" placeholder="Ex: 0">
<button onclick="remover()">Remover</button>

<div id="mensagem"></div>

<script>

// array que guarda os produtos
let produtos = [];


// adiciona um produto no array
function adicionar(){

    // pego os valores digitados
    let nome = document.getElementById("nome").value;
    let preco = parseFloat(document.getElementById("preco").value);
    let quantidade = parseInt(document.getElementById("quantidade").value);

    // se algo estiver vazio ou errado, não deixa adicionar
    if(nome === "" || isNaN(preco) || isNaN(quantidade)){
        alert("Preencha tudo corretamente");
        return;
    }

    // crio o objeto produto
    let produto = {
        nome: nome,
        preco: preco,
        quantidade: quantidade
    };

    // adiciono no array
    produtos.push(produto);

    // mostro quantos já tem cadastrados
    document.getElementById("mensagem").innerHTML =
        "Produto adicionado. Total cadastrados: " + produtos.length;

    // limpo os campos
    document.getElementById("nome").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("quantidade").value = "";
}


// lista os produtos em tabela
function listar(){

    if(produtos.length === 0){
        alert("Nenhum produto cadastrado");
        return;
    }

    let tabela = "<h3>Produtos cadastrados</h3>";
    tabela += "<table border='1'>";
    tabela += "<tr>";
    tabela += "<th>Índice</th>";
    tabela += "<th>Produto</th>";
    tabela += "<th>Preço (R$)</th>";
    tabela += "<th>Qtd</th>";
    tabela += "<th>Subtotal (R$)</th>";
    tabela += "</tr>";

    // percorro o array
    for(let i = 0; i < produtos.length; i++){

        let subtotal = produtos[i].preco * produtos[i].quantidade;

        tabela += "<tr>";
        tabela += "<td>" + i + "</td>";
        tabela += "<td>" + produtos[i].nome + "</td>";
        tabela += "<td>" + produtos[i].preco.toFixed(2) + "</td>";
        tabela += "<td>" + produtos[i].quantidade + "</td>";
        tabela += "<td>" + subtotal.toFixed(2) + "</td>";
        tabela += "</tr>";
    }

    tabela += "</table>";

    document.getElementById("mensagem").innerHTML = tabela;
}


// mostra um resumo geral
function resumo(){

    if(produtos.length === 0){
        alert("Nenhum produto cadastrado");
        return;
    }

    let totalItens = 0;
    let valorTotal = 0;

    for(let i = 0; i < produtos.length; i++){
        totalItens += produtos[i].quantidade;
        valorTotal += produtos[i].preco * produtos[i].quantidade;
    }

    document.getElementById("mensagem").innerHTML =
        "Total de produtos: " + produtos.length + "<br>" +
        "Total de itens: " + totalItens + "<br>" +
        "Valor total: R$ " + valorTotal.toFixed(2);
}


// remove pelo índice
function remover(){

    let indice = parseInt(document.getElementById("indice").value);

    if(isNaN(indice) || indice < 0 || indice >= produtos.length){
        alert("Índice inválido");
        return;
    }

    produtos.splice(indice, 1);

    document.getElementById("mensagem").innerHTML =
        "Produto removido. Total cadastrados: " + produtos.length;

    document.getElementById("indice").value = "";
}


// limpa tudo
function limpar(){
    produtos = [];
    document.getElementById("mensagem").innerHTML = "";
}

</script>

</body>
