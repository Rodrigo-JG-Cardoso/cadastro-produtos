<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Produtos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 class="titulo">Cadastro de Produtos (Array de Objetos)</h2>

<div class="container">

<div class="linha">
<label>Índice:</label>
<input id="indice" type="number" placeholder="Ex: 0">
</div>

<div class="linha">
<label>Produto:</label>
<input id="nome" type="text" placeholder="Ex: Mouse">
</div>

<div class="linha">
<label>Preço (R$):</label>
<input id="preco" type="number" step="0.01" placeholder="Ex: 99.90">
</div>

<div class="linha">
<label>Quantidade:</label>
<input id="qtd" type="number" placeholder="Ex: 2">
</div>

<div class="botoes">
<button id="btnAdicionar">Adicionar produto</button>
<button id="btnListar">Listar produtos</button>
<button id="btnResumo">Resumo</button>
<button id="btnLimpar">Limpar tudo</button>
</div>

<hr>

<h3>Remover por índice</h3>

<div class="linha">
<input id="idxRemover" type="number" placeholder="Ex: 0">
<button id="btnRemover">Remover</button>
</div>

<div id="saida"></div>

</div>

<script src="script.js"></script>

</body>
</html>
